<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>load json</title>
</head>
<body>

  <script>
    const url = "https://github.com/koskasmail/whatAmess/blob/main/00_data/apiStationList.json";

async function loadData() {
  const response = await fetch(url);
  const data = await response.json(); // parsed JSON

  return data;
}

// usage
loadData().then(data => {
  console.log(data);
});
  </script>
</body>
</html>
