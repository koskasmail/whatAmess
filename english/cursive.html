<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cursive Live Preview</title>

  <!-- Optional: Google Fonts cursive style -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .box {
      display: block;
      width: 100%;
      max-width: 500px;
      margin-bottom: 15px;
      padding: 8px;
      font-size: 18px;
    }

    /* Output box uses cursive font */
    #outputBox {
      font-family: 'Pacifico', cursive;
      background: #f5f5f5;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

  <label for="inputBox">Normal English (input):</label>
  <input
    id="inputBox"
    class="box"
    type="text"
    onkeypress="updateCursive()"
    onkeyup="updateCursive()"  <!-- helps catch last character -->
  >

  <label for="outputBox">Cursive English (output):</label>
  <input
    id="outputBox"
    class="box"
    type="text"
    readonly
  >

  <script>
    function updateCursive() {
      const input = document.getElementById('inputBox');
      const output = document.getElementById('outputBox');

      // Use setTimeout so the value updates AFTER the keypress is applied
      setTimeout(function () {
        output.value = input.value;
      }, 0);
    }
  </script>

</body>
</html>
